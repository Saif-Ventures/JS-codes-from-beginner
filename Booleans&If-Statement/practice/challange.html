<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>challange-cart</title>
</head>
<body>
    <p> Cart Quantity </p>
    <br>
    <button onclick="
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">Show quantity </button>

    <button onclick="
        if (cartQuantity + 1 > 10 ){
            alert ('Your cart is full');
        } else {
            cartQuantity ++ ;
            console.log(`Cart Quantity = ${cartQuantity}`);
        }
    ">Add cart</button>

    <button onclick="
        if (cartQuantity + 2 > 10 ){
            alert ('Your cart is full');
        } else {
            cartQuantity += 2 ;
            console.log(`Cart Quantity = ${cartQuantity}`);
        }
    ">2+</button>

    <button onclick="
        if (cartQuantity + 2 > 10 ){
            alert ('Your cart is full');
        } else {
            cartQuantity += 3 ;
        console.log(`Cart Quantity = ${cartQuantity}`);
        }
        
    ">3+</button>

    <button onclick="
        if (cartQuantity - 1 < 0 ){
            alert ('Not enough items in the cart.');
        } else {
            cartQuantity -- ;
            console.log(`Cart Quantity = ${cartQuantity}`);
        }
        
    ">Remove From cart</button>

    <button onclick="
        if (cartQuantity - 2 < 0 ){
            alert ('Not enough items in the cart.');
        } else {
            cartQuantity -= 2 ;
            console.log(`Cart Quantity = ${cartQuantity}`);
        }
        
    ">-2</button>

    <button onclick="
        if (cartQuantity - 2 < 0 ){
            alert ('Not enough items in the cart.');
        } else {
            cartQuantity -= 3 ;
            console.log(`Cart Quantity = ${cartQuantity}`);
        }
        
    ">-3</button>

    <button onclick="
        cartQuantity = cartQuantity*0 ;
        console.log ('cart is reset.');
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">Reset </button>

<script>
    let cartQuantity = 0;
</script>    

    
</body>
</html>
