<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cartQuantity</title>
</head>
<body>
    <p> Cart Quantity </p>
    <br>
    <button onclick="
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">Show quantity </button>

    <button onclick="
        cartQuantity ++ ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">Add cart</button>

    <button onclick="
        cartQuantity += 2 ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">2+</button>

    <button onclick="
        cartQuantity += 3 ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">3+</button>

    <button onclick="
        cartQuantity += 4 ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">4+</button>

    <button onclick="
        cartQuantity += 5 ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">5+</button>

    <button onclick="
        cartQuantity -- ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">Remove From cart</button>

    <button onclick="
        cartQuantity -= 2 ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">-2</button>

    <button onclick="
        cartQuantity -= 3 ;
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">-3</button>

    <button onclick="
        cartQuantity = cartQuantity*0 ;
        console.log ('cart is reset.');
        console.log(`Cart Quantity = ${cartQuantity}`);
    ">Reset </button>

<script>
    let cartQuantity = 0;
</script>    

</body>
</html>
