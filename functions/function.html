        // Parameters

        function calcTax(cost) {
            console.log(cost * 0.1)
        }
        calcTax (1950);

        // we can also use more than one parameter. also we can fixed a value.

        function calcTax(cost,taxPer = 0.1) {
            console.log(cost * taxPer)
        }
        calcTax (1950,0.1);


    </script>
